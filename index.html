<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnaesCards · FANZCA Revision</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0c0f14;--surface:#131720;--card:#181d28;--border:#232a38;--accent:#4af0c4;--accent2:#f0a84a;--accent3:#a84af0;--text:#e8edf5;--muted:#6b7894;--danger:#f05a4a; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
  body::before{content:'';position:fixed;top:-30%;left:-20%;width:60vw;height:60vw;background:radial-gradient(circle,rgba(74,240,196,0.04) 0%,transparent 70%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;bottom:-20%;right:-20%;width:50vw;height:50vw;background:radial-gradient(circle,rgba(168,74,240,0.05) 0%,transparent 70%);pointer-events:none;z-index:0}
  header{position:sticky;top:0;z-index:100;background:rgba(12,15,20,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'Fraunces',serif;font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--accent)}
  .logo span{color:var(--text)}
  .prog-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent)}
  .mode-indicator{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
  .progress-ring-wrap{display:flex;align-items:center;gap:8px}
  .topic-bar{position:relative;z-index:10;padding:12px 16px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface)}
  .topic-bar::-webkit-scrollbar{display:none}
  .topic-chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .topic-chip.active{background:var(--accent);color:#0c0f14;border-color:var(--accent);font-weight:500}
  .topic-chip:hover:not(.active){border-color:var(--accent);color:var(--accent)}
  .progress-bar-wrap{padding:0 16px 2px;position:relative;z-index:10}
  .progress-bar-bg{height:3px;background:var(--border);border-radius:10px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:10px;transition:width 0.4s ease}
  .card-area{flex:1;position:relative;z-index:5;padding:20px 16px 100px;max-width:600px;margin:0 auto;width:100%}
  .card-counter{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;letter-spacing:1px}
  .card-wrapper{perspective:1200px;min-height:460px;cursor:pointer;position:relative;animation:slideIn 0.35s ease}
  .card-inner{position:relative;width:100%;min-height:460px;transform-style:preserve-3d;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1)}
  .card-inner.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;top:0;left:0;width:100%;min-height:460px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:20px;border:1px solid var(--border);background:var(--card);overflow:hidden;display:flex;flex-direction:column}
  .card-face.back{transform:rotateY(180deg);background:linear-gradient(160deg,#131d25 0%,#131720 100%);border-color:rgba(74,240,196,0.2)}
  .card-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:14px 20px 0;color:var(--muted);display:flex;align-items:center;gap:8px}
  .card-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .card-question{flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 24px 20px}
  .card-question h2{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1.3;margin-bottom:12px;letter-spacing:-0.3px}
  .card-question .subtitle{font-size:13px;color:var(--muted);line-height:1.5}
  .card-hint{padding:14px 24px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);border-top:1px solid var(--border);display:flex;align-items:center;gap:6px}
  .card-answer{flex:1;padding:20px 22px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .answer-title{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--accent);margin-bottom:4px}
  .ans-block{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
  .ans-block h4{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:8px}
  .ans-block ul{list-style:none;display:flex;flex-direction:column;gap:5px}
  .ans-block ul li{font-size:13px;line-height:1.45;color:var(--text);padding-left:16px;position:relative}
  .ans-block ul li::before{content:'→';position:absolute;left:0;color:var(--accent);font-size:11px}
  .ans-block .pill-row{display:flex;flex-wrap:wrap;gap:5px}
  .pill{padding:3px 10px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;background:rgba(74,240,196,0.08);border:1px solid rgba(74,240,196,0.2);color:var(--accent)}
  .pill.warn{background:rgba(240,168,74,0.08);border-color:rgba(240,168,74,0.2);color:var(--accent2)}
  .pill.danger{background:rgba(240,90,74,0.08);border-color:rgba(240,90,74,0.2);color:var(--danger)}
  .pill.purple{background:rgba(168,74,240,0.08);border-color:rgba(168,74,240,0.2);color:var(--accent3)}
  .ans-table{width:100%;border-collapse:collapse;font-size:12px}
  .ans-table th{text-align:left;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.8px;color:var(--muted);padding:4px 8px;border-bottom:1px solid var(--border)}
  .ans-table td{padding:5px 8px;border-bottom:1px solid rgba(35,42,56,0.5);color:var(--text);line-height:1.3}
  .ans-table td:first-child{color:var(--accent);font-family:'DM Mono',monospace;font-size:11px}
  .exam-pearl{background:linear-gradient(135deg,rgba(168,74,240,0.12),rgba(74,240,196,0.05));border:1px solid rgba(168,74,240,0.3);border-radius:10px;padding:10px 14px;font-size:12px;font-style:italic;color:#c5b3e8;line-height:1.5;margin-top:2px}
  .exam-pearl::before{content:'💎 ';font-style:normal}
  .nav-bar-outer{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(12,15,20,0.92);backdrop-filter:blur(16px);border-top:1px solid var(--border)}
  .nav-bar{position:relative;background:none;backdrop-filter:none;border:none;padding:12px 20px 20px;display:flex;gap:10px;justify-content:center;max-width:600px;margin:0 auto}
  .nav-btn{flex:1;max-width:140px;padding:13px;border-radius:14px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-btn.flip-btn{background:linear-gradient(135deg,rgba(74,240,196,0.15),rgba(74,240,196,0.05));border-color:rgba(74,240,196,0.3);color:var(--accent);flex:2;max-width:200px}
  .nav-btn:active{transform:scale(0.97)}
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed}
  .tag-airway .dot{background:#4af0c4}
  .tag-monitoring .dot{background:#f0a84a}
  .tag-drugs .dot{background:#a84af0}
  .tag-regional .dot{background:#4a8af0}
  .tag-critical .dot{background:#f05a4a}
  .tag-physiology .dot{background:#4af08a}
  .tag-ventilation .dot{background:#f0e44a}
  .tag-safety .dot{background:#f04ab0}
  @keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <div class="logo">Anaes<span>Cards</span></div>
  <div class="progress-ring-wrap">
    <span class="mode-indicator">FANZCA REV</span>&nbsp;
    <span class="prog-text" id="prog-text">1 / 31</span>
  </div>
</header>
<div class="topic-bar">
  <button class="topic-chip active" onclick="filterTopic('all',this)">All</button>
  <button class="topic-chip" onclick="filterTopic('airway',this)">Airway</button>
  <button class="topic-chip" onclick="filterTopic('ventilation',this)">Ventilation</button>
  <button class="topic-chip" onclick="filterTopic('monitoring',this)">Monitoring</button>
  <button class="topic-chip" onclick="filterTopic('drugs',this)">Drugs</button>
  <button class="topic-chip" onclick="filterTopic('regional',this)">Regional</button>
  <button class="topic-chip" onclick="filterTopic('critical',this)">Critical Care</button>
  <button class="topic-chip" onclick="filterTopic('safety',this)">Safety</button>
  <button class="topic-chip" onclick="filterTopic('physiology',this)">Physiology</button>
</div>
<div class="progress-bar-wrap">
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
</div>
<div class="card-area">
  <div class="card-counter" id="card-counter">CARD 1 OF 31</div>
  <div class="card-wrapper" id="card-wrapper" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face front" id="front-face"></div>
      <div class="card-face back" id="back-face"></div>
    </div>
  </div>
</div>
<div class="nav-bar-outer">
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← Prev</button>
    <button class="nav-btn flip-btn" onclick="flipCard()">↻ Flip</button>
    <button class="nav-btn" id="next-btn" onclick="navigate(1)">Next →</button>
  </div>
</div>
<script>
const cards=[
  // ── AIRWAY ───────────────────────────────────────────────────────────────────
  {topic:'airway',title:'Per-Oxygenation',subtitle:'Why should apnoeic oxygenation be routine for every patient?',tag:'AIRWAY SAFETY',tagClass:'tag-airway',answerTitle:'The physiological case for per-oxygenation',blocks:[{heading:'Mechanism',items:['O₂ consumption ≈200–250 mL/min during apnoea','CO₂ buffers → minimal alveolar volume change','Negative alveolar pressure draws O₂ inward if airway patent','Oxygenation continues without ventilation (mass flow)']},{heading:'Clinical Rationale',items:['Delays desaturation — buys time for first-pass success','Reduces panic-driven airway trauma','Most catastrophes occur in "apparently easy" airways','Even ASA I patients desaturate rapidly if mask seal suboptimal']},{heading:'Implementation',pills:['Nasal cannula 5–15 L/min','HFNO if available','Continue during laryngoscopy','Leave on during induction']}],pearl:'High-reliability systems embed per-oxygenation as default — it costs nothing and the downside risk is minimal.'},
  {topic:'airway',title:'Pre-oxygenation Technique',subtitle:'Standard techniques and optimisation strategies before induction.',tag:'AIRWAY · AURA SERIES',tagClass:'tag-airway',answerTitle:'Pre-oxygenation essentials',blocks:[{heading:'Target',pills:['EtO₂ > 90%','Denitrogenation = full O₂ reserve','Prevents rapid desaturation']},{heading:'Standard Techniques',items:['3 minutes tidal breathing (most reliable)','8 deep vital capacity breaths (faster alternative)','Ensure tight mask seal throughout']},{heading:'Optimisation',items:['Head-up position ~25° — improves FRC & O₂ reserve','HFNO — apnoeic oxygenation throughout','CPAP/PEEP — especially in obese patients']},{heading:'Red Flags',pills:['Poor mask seal','Critically ill → rapid desat','Inadequate time'],pillStyle:'danger'}],pearl:'Head-up 25° is the single best-evidence positional modification — improves FRC and prolongs safe apnoea time.'},
  {topic:'airway',title:'RSI in Low GCS',subtitle:'What is the APICE approach to intubation when cause is unknown?',tag:'AIRWAY · EMERGENCY',tagClass:'tag-airway',answerTitle:'APICE framework — A, P, I, C, E',blocks:[{heading:'A — Assess First',items:['ABCDG: Airway, Breathing, Circulation, Disability, Glucose','Low GCS ≠ automatic intubation; GCS ≤8 with poor airway protection usually does','Correct reversibles: glucose, naloxone, benzodiazepine, O₂']},{heading:'I — Induction Drug Choice',table:[['Etomidate 0.2–0.3 mg/kg','Haemodynamic stability','Adrenal suppression (single dose OK)'],['Ketamine 1–2 mg/kg','Maintains BP','Avoid in severe HTN'],['Propofol 1–2 mg/kg','Reduces ICP','Hypotension risk']],tableHeaders:['Drug','Advantage','Concern']},{heading:'C + E — RSI & Cerebral Protection',items:['Sux 1–1.5 mg/kg or Roc 1.2 mg/kg','SpO₂ >94%, SBP >100 mmHg, PaCO₂ 35–40 mmHg','Hyperventilate ONLY if impending herniation']}],pearl:'Oxygenation, perfusion, and brain physiology are the priorities — not the intubation itself.'},
  {topic:'airway',title:'OSA & Anaesthesia',subtitle:'What are the key anaesthetic considerations in OSA?',tag:'AIRWAY · COMORBIDITY',tagClass:'tag-airway',answerTitle:'OSA: anaesthetic framework',blocks:[{heading:'Risk Profile',items:['Independent risk factor for difficult BMV and laryngoscopy','Baseline hypoxaemia common','↑ aspiration risk + post-op respiratory compromise']},{heading:'Intraoperative',items:['Anticipate difficult BMV/DL — VL + bougie + SGA ready','Optimise preoxygenation (HFNO)','Ramped position']},{heading:'Post-op by Severity',table:[['Mild (AHI 5–15)','Optimize preox + ramped positioning'],['Moderate (AHI 15–30)','CPAP/nasal airway, minimise opioids, extended PACU'],['Severe (AHI >30)','CPAP, multimodal analgesia, extended PACU ± NAs']],tableHeaders:['Severity','Post-op Management']}],pearl:'OSA is often under-recognised. Even "low-risk" lists have OSA patients — ask about CPAP use, witnessed apnoeas, and Epworth score.'},
  {topic:'airway',title:'Double Lumen Tube (DLT)',subtitle:'What is a DLT, when do you use it, and how do you confirm position?',tag:'AIRWAY · THORACIC',tagClass:'tag-airway',answerTitle:'Double lumen tube essentials',blocks:[{heading:'Structure & Function',items:['Two lumens: tracheal (proximal cuff) + bronchial (distal cuff)','Allows independent ventilation of each lung','OLV, lung isolation, prevent cross-contamination']},{heading:'Indications',pills:['Thoracic surgery','Lung infection / bleeding','Oesophageal surgery','VATS'],pillStyle:'normal'},{heading:'Positioning',items:['Left-sided DLT preferred (longer left mainstem bronchus)','Confirm with fibreoptic bronchoscopy — gold standard','Signs of malposition: SpO₂ drop, unequal breath sounds, high airway pressures']},{heading:'OLV Complications',pills:['Hypoxia during OLV','Airway trauma','Malposition'],pillStyle:'danger'}],pearl:'Always confirm DLT position with FOB after positioning the patient lateral — movement frequently displaces the tube.'},
  {topic:'airway',title:'Difficult Airway Algorithm',subtitle:'What is the structured approach when you cannot intubate or ventilate?',tag:'AIRWAY · CRISIS',tagClass:'tag-airway',answerTitle:'Difficult airway management algorithm',blocks:[{heading:'ANZCA / DAS Core Principles',items:['Call for help early — do not persist alone','Limit intubation attempts (max 3 + 1 by senior) — each attempt worsens conditions','Maintain oxygenation at every step — never abandon oxygen']},{heading:'Cannot Intubate, CAN Ventilate (CICV)',items:['Declare the situation aloud','Place SGA (LMA, i-gel) — 2nd generation preferred','Consider waking patient if elective surgery','If SGA successful: proceed only if surgery is life-saving']},{heading:'Cannot Intubate, CANNOT Ventilate (CICV Emergency)',pills:['This is a LIFE-THREATENING emergency','Immediate front-of-neck access (FONA)','Scalpel-finger-bougie technique (preferred over needle cric)'],pillStyle:'danger'},{heading:'FONA: Scalpel Technique',items:['10-blade scalpel — horizontal stab incision through CTM','Hook trachea caudally with finger or hook','Bougie through incision, railroad 6.0 cuffed ETT','Inflate cuff, confirm with EtCO₂']},{heading:'Prevention',items:['Airway assessment: LEMON, MOANS, RODS, SHORT','Plan A, B, C, D before every airway','Pre-oxygenate, position, prepare for failure','Video laryngoscope as primary in anticipated difficulty']}],pearl:'The CICV scenario is survivable if you declare early, limit attempts, and go to FONA without delay. Most deaths occur from repeated failed intubation attempts, not from surgical airway.'},

  // ── VENTILATION ──────────────────────────────────────────────────────────────
  {topic:'ventilation',title:'Lung Compliance',subtitle:'Define lung compliance, and explain what Cstat vs Cdyn tell you clinically.',tag:'VENTILATION · PHYSIOLOGY',tagClass:'tag-ventilation',answerTitle:'Lung compliance in mechanical ventilation',blocks:[{heading:'Definition',items:['C = ΔV / ΔP (change in volume per unit change in pressure)','Normal: 50–100 mL/cmH₂O','Decreased (<50): stiff lungs; Increased: floppy/hyperinflated']},{heading:'Static vs Dynamic',table:[['Cstat','VT / (Pplat – PEEP)','Inspiratory pause; reflects lung + chest wall; best for ARDS monitoring'],['Cdyn','corrected VT / (PIP – PEEP)','Active airflow; also affected by airway resistance']],tableHeaders:['Type','Formula','Meaning']},{heading:'Causes of ↓ Compliance',pills:['ARDS','Pulmonary oedema','Pneumonia','Fibrosis','Atelectasis'],pillStyle:'danger'},{heading:'Causes of ↑ Compliance',pills:['Emphysema','Hyperinflation'],pillStyle:'warn'},{heading:'PV Curve',items:['Steep slope = high compliance','Flat slope = low compliance (ARDS)','Lower inflection = optimal PEEP; Upper = overdistension risk']}],pearl:'Ppeak – Pplat = resistive pressure. Pplat – PEEP = driving pressure. Keep driving pressure <15 cmH₂O in ARDS.'},
  {topic:'ventilation',title:'Ventilator Settings Basics',subtitle:'What are the initial ventilator settings and how do you adjust for oxygenation vs ventilation?',tag:'VENTILATION · SETTINGS',tagClass:'tag-ventilation',answerTitle:'Simplified ventilator settings',blocks:[{heading:'Basic Adult Starting Point',table:[['FiO₂','21–100% (start 40–60%, titrate)'],['PEEP','5 cmH₂O'],['Respiratory Rate','12–20 /min'],['Tidal Volume','6–8 mL/kg predicted body weight'],['I:E Ratio','1:2 (usual default)']],tableHeaders:['Parameter','Value']},{heading:'Modes',items:['AC (Assist Control) — full support, best post-intubation','SIMV — mandatory breaths + spontaneous; less favoured now','PSV — fully patient-driven; used for weaning']},{heading:'Adjusting Problems',items:['↓ PaO₂ → ↑ FiO₂ or ↑ PEEP','↑ PaCO₂ → ↑ RR or ↑ VT (minute ventilation = RR × VT)']},{heading:'Disease-Specific',items:['ARDS: VT 4–6 mL/kg, higher PEEP, Pplat <30, driving P <15','COPD/Asthma: low VT + low RR, I:E 1:3–1:5 (prevent air trapping)']},{heading:'Extubation Checklist',pills:['FiO₂ ≤30–40%','PEEP = 5','Awake + commands','Adequate cough','Cuff leak present'],pillStyle:'normal'}],pearl:'CO₂ is controlled by minute ventilation (RR × VT). Oxygenation by FiO₂ and PEEP. Always use predicted body weight for VT.'},

  // ── MONITORING ───────────────────────────────────────────────────────────────
  {topic:'monitoring',title:'Capnography: Waveform Patterns',subtitle:'Identify the key abnormal capnogram patterns and their causes.',tag:'MONITORING · CAPNOGRAPHY',tagClass:'tag-monitoring',answerTitle:'Capnogram abnormalities',blocks:[{heading:'Waveform Shape Abnormalities',table:[['Upsloping Phase III','Bronchospasm / COPD / partial ETT obstruction'],['Clefts in Phase III','Spontaneous breathing during CMV'],['Dual plateau','Single-lung transplant (two compartments)'],['Oesophageal pattern','Small decreasing waves × 7 cycles → zero'],['Raised baseline','CO₂ rebreathing (faulty expiratory valve / exhausted absorber)'],['Slow downslope','Faulty inspiratory valve → CO₂ in inspiratory limb']],tableHeaders:['Pattern','Cause']},{heading:'EtCO₂ Trend Abnormalities',table:[['Sudden ↓ to zero','Catastrophic loss of ventilation / circuit disconnect'],['Sudden ↓','Cardiac arrest / pulmonary embolus'],['Gradual ↓','Hyperventilation / ↓ metabolism / ↓ pulmonary perfusion'],['Gradual ↑','Hypoventilation / laparoscopy / ↑ metabolism'],['Transient ↑','Tourniquet release / bicarbonate bolus']],tableHeaders:['Trend','Cause']}],pearl:'EtCO₂ = most sensitive early warning of circuit/ventilation failure. Always confirm ETT placement with sustained waveform.'},
  {topic:'monitoring',title:'Pulse Oximetry: Mechanism',subtitle:'Explain the physics — Beer-Lambert law, wavelengths, and ratio-of-ratios.',tag:'MONITORING · PHYSICS',tagClass:'tag-monitoring',answerTitle:'How pulse oximetry works',blocks:[{heading:'Beer-Lambert Law',items:['Absorption ∝ concentration × path length','Two wavelengths: 660 nm (red) and 940 nm (infrared)','HbO₂ absorbs more at 940 nm; HHb absorbs more at 660 nm']},{heading:'AC/DC Separation',items:['DC = venous + tissue + non-pulsatile arterial blood (constant)','AC = pulsatile arterial blood (variable)','Device uses only AC component → measures arterial SaO₂']},{heading:'Ratio-of-Ratios',pills:['R = (AC₆₆₀/DC₆₆₀) ÷ (AC₉₄₀/DC₉₄₀)','R = 1.0 → SpO₂ fixed at 85%','R < 1 → high SpO₂; R > 1 → low SpO₂'],pillStyle:'purple'}],pearl:'At R=1.0, SpO₂ is empirically set to 85% — the isobestic point. This is why severe desaturation gives variable readings.'},
  {topic:'monitoring',title:'Pulse Oximetry: Errors',subtitle:'What causes false high and false low SpO₂ readings?',tag:'MONITORING · ERRORS',tagClass:'tag-monitoring',answerTitle:'Pulse oximetry error sources',blocks:[{heading:'False HIGH',table:[['HbCO','Resembles HbO₂ at 660 nm; 50% HbCO → SpO₂ reads 95%'],['Skin pigment (melanin)','Absorbs infrared → falsely elevated'],['MetHb (moderate)','Pulls toward 85%']],tableHeaders:['Source','Mechanism']},{heading:'False LOW',table:[['Methylene blue / ICG','Absorbs at 660 nm → transient SpO₂ drop'],['Anaemia (Hct <10%)','Under-reads by ~5%'],['Nail varnish (dark)','Black/blue/green most problematic']],tableHeaders:['Source','Effect']},{heading:'No Effect (misconceptions)',pills:['Jaundice / bilirubin','Foetal Hb','Sickle Hb','Polycythaemia'],pillStyle:'normal'}],pearl:'CO poisoning: SpO₂ reads near-normal while patient is hypoxic. Only co-oximetry reveals the true picture.'},
  {topic:'monitoring',title:'Modified Shock Index (MSI)',subtitle:'What is the MSI, how is it calculated, and when is it clinically useful?',tag:'MONITORING · HAEMODYNAMICS',tagClass:'tag-monitoring',answerTitle:'Modified Shock Index (MSI)',blocks:[{heading:'Formula',pills:['MSI = HR ÷ MAP','MAP = (2×DBP + SBP) ÷ 3'],pillStyle:'purple'},{heading:'Interpretation',table:[['0.5–0.7','Normal'],['> 1.0','Possible haemodynamic instability'],['> 1.3','High risk of shock / poor perfusion']],tableHeaders:['MSI','Clinical Meaning']},{heading:'Clinical Applications',items:['Early shock detection (before BP drops)','Trauma patient assessment','Sepsis / hypovolaemia monitoring','Weaning assessment + post-intubation monitoring']},{heading:'Advantage over Traditional Shock Index',items:['Uses MAP — reflects overall tissue perfusion better than SBP alone','Rising MSI = early sign of deterioration even before BP drops']}],pearl:'Example: HR 110, MAP 70 → MSI = 1.57 → significant haemodynamic compromise. More sensitive than systolic BP alone.'},
  {topic:'monitoring',title:'TEG: Thromboelastography',subtitle:'What do R, K, α angle, MA, and LY30 represent on a TEG trace?',tag:'MONITORING · COAGULATION',tagClass:'tag-monitoring',answerTitle:'TEG parameters and clinical meaning',blocks:[{heading:'TEG Parameters',table:[['R (Reaction Time)','Time to first fibrin; evaluates intrinsic pathway + coagulation factors'],['K (Formation Time)','Velocity of clot formation; speed of fibrinogen + platelet interaction'],['α Angle','Slope of clot formation; platelet-fibrin interaction + polymerisation rate'],['MA (Maximum Amplitude)','Maximum clot strength; platelet function + fibrinogen contribution'],['LY30 (Lysis at 30 min)','% reduction in amplitude 30 min after MA; quantifies fibrinolysis']],tableHeaders:['Parameter','Clinical Significance']},{heading:'Interpreting Abnormalities → Treatment',items:['Prolonged R → factor deficiency → FFP','Low MA → platelet dysfunction → platelets','Low α angle + low MA → fibrinogen deficiency → cryoprecipitate','High LY30 → fibrinolysis → tranexamic acid']}],pearl:'TEG/ROTEM allows goal-directed transfusion — avoiding both under-treatment (coagulopathy) and over-treatment (transfusion complications).'},
  {topic:'monitoring',title:'Pre-op Hypertension & WCH',subtitle:'How do you assess and manage elevated BP found on the day of surgery?',tag:'MONITORING · PRE-OP',tagClass:'tag-monitoring',answerTitle:'Pre-op HTN management framework',blocks:[{heading:'Acceptable BP Thresholds',table:[['Mild HTN','<160/100','Proceed'],['Moderate HTN','160–179 / 100–109','Usually proceed (optimise)'],['Severe HTN','≥180/110','Postpone if elective']],tableHeaders:['Category','BP','Action']},{heading:'WCH Approach',items:['Repeat after 5–10 min rest in correct cuff size','Check home readings + clinic trend','Anxiolysis: midazolam 0.5–1 mg IV (very effective)','Recheck after anxiolysis — expect 10–20% drop']},{heading:'Intraoperative Golden Rule',pills:['Maintain within ±20% of baseline BP','Chronic HTN → higher autoregulatory threshold'],pillStyle:'warn'},{heading:'Never Do',pills:['Rapid IV antihypertensives unless emergency','Chase numbers aggressively'],pillStyle:'danger'}],pearl:'WCH is common in elderly patients. Overtreatment causing hypotension is more dangerous than modestly elevated pre-op BP.'},

  // ── DRUGS ─────────────────────────────────────────────────────────────────────
  {topic:'drugs',title:'Manual TIVA Without TCI',subtitle:'How do you run TIVA when you don\'t have a TCI pump?',tag:'DRUGS · TIVA',tagClass:'tag-drugs',answerTitle:'Manual TIVA principles',blocks:[{heading:'Bristol (10-8-6) Propofol Model',items:['0–10 min: 10 mg/kg/h','10–20 min: 8 mg/kg/h','20–60 min: 6 mg/kg/h','>60 min: 4–6 mg/kg/h','Reduce 20–30% in elderly'],pills:['Target plasma ≈3.67 µg/mL'],pillStyle:'purple'},{heading:'Remifentanil Maintenance',table:[['Light surgery','0.05–0.1 µg/kg/min'],['Major surgery','0.1–0.2 µg/kg/min'],['Very stimulating','Up to 0.3 µg/kg/min']],tableHeaders:['Context','Dose']},{heading:'Monitoring',items:['pEEG (BIS/Entropy) — strongly recommended to avoid awareness','Clinical signs: lacrimation, movement, sweating, HR, BP']},{heading:'Emergence',pills:['Stop remifentanil at skin closure','Propofol → 4–5 mg/kg/h (last 10 min)','Stop propofol when dressings applied'],pillStyle:'warn'}],pearl:'Without TCI you carry the PK model in your head. The 10-8-6 rule compensates for redistribution phases.'},
  {topic:'drugs',title:'Sugammadex',subtitle:'How does sugammadex work, what are the doses, and what is the risk of anaphylaxis?',tag:'DRUGS · NMB REVERSAL',tagClass:'tag-drugs',answerTitle:'Sugammadex: APICE way',blocks:[{heading:'Mechanism',items:['Modified γ-cyclodextrin — encapsulates aminosteroid NMBAs (rocuronium, vecuronium)','Rapid, predictable reversal; no muscarinic side effects','Useful for deep block, difficult airway rescue, ERAS pathways']},{heading:'Dosing by Depth of Block',table:[['TOF 2/4 (moderate)','2 mg/kg'],['PTC ≥1 (deep)','4 mg/kg (2×2)'],['Immediate reversal / RSI rescue','16 mg/kg (4×4)']],tableHeaders:['Clinical Situation','Dose']},{heading:'Anaphylaxis',items:['Estimated ~1 in 25,000–40,000 administrations','IgE-mediated OR direct mast cell activation (MRGPRX2 receptor)','Neo-epitope hypothesis: sugammadex–rocuronium complex may form new antigen','Can occur on first exposure']},{heading:'Management',items:['Stop agent, call for help, adrenaline early + titrated','100% O₂, airway control, IV fluids, vasopressors','Serum tryptase (immediate + 1–2h + baseline)','Yellow card, allergy passport, patient letter']}],pearl:'Renal failure (eGFR <30): use with caution — re-paralysis if under-dosed. Use sugammadex where it adds clear clinical value.'},
  {topic:'drugs',title:'Propofol in Obese Patients',subtitle:'Which weight scalar should you use for propofol induction and maintenance in obesity?',tag:'DRUGS · OBESITY',tagClass:'tag-drugs',answerTitle:'Propofol dosing in obesity',blocks:[{heading:'Key Principle',items:['Do NOT dose to Total Body Weight — overdose, hypotension, delayed emergence','Initial CNS effect depends on cardiac output and lean mass, not fat mass']},{heading:'Which Weight?',table:[['Induction','Lean Body Weight (LBW)','1.5–2 mg/kg LBW'],['Maintenance (TIVA)','Adjusted Body Weight (AdjBW)','75–125 mcg/kg/min'],['Sedation','LBW','25–50 mcg/kg/min — go slow']],tableHeaders:['Phase','Weight Used','Dose']},{heading:'LBW Approximation',items:['LBW is usually 60–75 kg even if TBW is 120–150 kg','AdjBW = LBW + 0.4 × (TBW – LBW)']},{heading:'Why Obese Patients Drop BP Fast',pills:['↓ SVR (vasodilation)','Relative hypovolaemia','Reduced venous return','Often undiagnosed OSA'],pillStyle:'danger'}],pearl:'Pre-load judiciously and start noradrenaline early in high-risk obese patients — pushing fluids blindly worsens outcomes.'},
  {topic:'drugs',title:'Fentanyl PK for Long Cases',subtitle:'How do you dose fentanyl as sole opioid for long surgery using PK principles?',tag:'DRUGS · OPIOIDS',tagClass:'tag-drugs',answerTitle:'Fentanyl: PK-driven dosing',blocks:[{heading:'PK Principles',items:['Highly lipophilic — fat acts as slow reservoir','Context-sensitive half-time ↑ with duration of infusion','Goal: maintain stable effect-site concentration (1–2 ng/mL)']},{heading:'Target Ce',table:[['Minimal analgesia','0.5–1 ng/mL'],['Surgical analgesia (GA/TIVA)','1–2 ng/mL'],['Profound analgesia','2–3 ng/mL'],['Respiratory depression risk','>3 ng/mL']],tableHeaders:['Clinical Aim','Ce (approx.)']},{heading:'Dosing Strategy',items:['Loading: 1–2 µg/kg IV over 2–3 min','Maintenance: start 1 µg/kg/h → reduce to 0.5–0.7 µg/kg/h after 60–90 min','Supplemental bolus 0.5–1 µg/kg IV, 10–15 min before incision/traction']},{heading:'Tapering',table:[['Last 90 min','↓ by 25–50%'],['Last 30 min','Stop infusion'],['Closure','Non-opioid adjuncts']],tableHeaders:['Timing','Action']}],pearl:'Morphine has active metabolites (M6G) — unsafe in renal failure. Remifentanil has constant CSHT. Fentanyl is the middle ground for most long cases.'},
  {topic:'drugs',title:'Adrenaline in Shock',subtitle:'What are the doses of adrenaline infusion across different shock states?',tag:'DRUGS · VASOPRESSORS',tagClass:'tag-drugs',answerTitle:'Adrenaline (epinephrine) infusion dosing',blocks:[{heading:'Standard Preparation',items:['5 ampoules 1:1000 (1 mg/mL) = 5 mg in 50 mL total','Final concentration: 100 mcg/mL'],pills:['Rate = Dose × Weight × 60 ÷ Concentration'],pillStyle:'purple'},{heading:'Shock-Specific Doses',table:[['Anaphylaxis','0.05','0.05–0.1','After IM adrenaline + fluids'],['Septic (refractory)','0.05','0.05–0.3','Add after norepinephrine'],['Cardiogenic','0.01–0.05','0.01–0.5','Refractory only'],['Post-ROSC','0.1','0.1–0.5','MAP ≥65 mmHg'],['Refractory brady','—','2–10 mcg/min','Bridge to pacing']],tableHeaders:['Shock','Start (mcg/kg/min)','Range','Notes']}],pearl:'70 kg patient at 0.1 mcg/kg/min on 100 mcg/mL = 4.2 mL/hr. Always double-check with the formula at the bedside.'},
  {topic:'drugs',title:'Norepinephrine Infusion',subtitle:'Standard preparation and dosing for norepinephrine in vasodilatory shock.',tag:'DRUGS · VASOPRESSORS',tagClass:'tag-drugs',answerTitle:'Norepinephrine infusion guide',blocks:[{heading:'Preparation',items:['8 mg in 50 mL → 160 mcg/mL','Central line ONLY','Rate (mL/h) = Dose × Weight × 60 ÷ Concentration']},{heading:'Reference Table (70 kg, 160 mcg/mL)',table:[['0.05','3.5','1.3'],['0.1','7','2.6'],['0.2','14','5.3'],['0.5','35','13.1'],['1.0','70','26.3']],tableHeaders:['Dose (mcg/kg/min)','Total (mcg/min)','Rate (mL/h)']},{heading:'Clinical Context',items:['First-line vasopressor in septic shock','α₁ dominant → vasoconstriction ↑ SVR','Adrenaline added second-line for refractory cases']}],pearl:'Norepinephrine raises MAP by increasing SVR — in cardiogenic shock this afterload increase can be harmful.'},
  {topic:'drugs',title:'Dobutamine Infusion',subtitle:'How do you prepare and dose dobutamine in cardiogenic shock?',tag:'DRUGS · INOTROPES',tagClass:'tag-drugs',answerTitle:'Dobutamine infusion dosing',blocks:[{heading:'Preparation',items:['250 mg diluted to 50 mL total','Final concentration: 5000 mcg/mL']},{heading:'Dose Range + Formula',pills:['2–20 mcg/kg/min','Rate (mL/hr) = Weight × Dose × 60 ÷ Concentration'],pillStyle:'purple'},{heading:'Reference Table (70 kg, 5000 mcg/mL)',table:[['2','140','1.7'],['5','350','4.2'],['10','700','8.4'],['15','1050','12.6'],['20','1400','16.8']],tableHeaders:['Dose (mcg/kg/min)','Total (mcg/min)','Rate (mL/hr)']},{heading:'Clinical Notes',items:['β₁ dominant → ↑ inotropy + ↑ HR','Can worsen hypotension — pair with vasopressor if hypotensive']}],pearl:'Dobutamine does not reliably raise MAP — it is an inotrope, not a vasopressor. Combine with noradrenaline in hypotensive cardiogenic shock.'},
  {topic:'drugs',title:'Dopamine Infusion',subtitle:'How do you prepare dopamine and what are its dose-dependent receptor effects?',tag:'DRUGS · INOTROPES',tagClass:'tag-drugs',answerTitle:'Dopamine infusion dosing',blocks:[{heading:'Preparation',items:['200 mg in 5 mL vial → dilute to 50 mL total','Final concentration: 4000 mcg/mL']},{heading:'Dose-Dependent Receptor Effects',table:[['1–5 mcg/kg/min','Dopaminergic','↑ Renal + mesenteric flow (renal protection largely debunked)'],['5–10 mcg/kg/min','β₁ dominant','↑ HR, ↑ Contractility, ↑ CO'],['10–20 mcg/kg/min','α₁ dominant','Vasoconstriction, ↑ SVR, ↑ MAP']],tableHeaders:['Dose','Receptor','Effect']},{heading:'Reference Table (70 kg, 4000 mcg/mL)',table:[['2','2.1'],['5','5.3'],['8','8.4'],['10','10.5'],['15','15.8'],['20','21.0']],tableHeaders:['Dose (mcg/kg/min)','Rate (mL/hr)']},{heading:'Formula',pills:['Rate (mL/hr) = Dose × Weight × 60 ÷ Concentration'],pillStyle:'purple'}],pearl:'"Renal dose" dopamine is not supported by evidence — norepinephrine + careful fluid management is preferred in septic shock.'},
  {topic:'drugs',title:'Amiodarone Infusion',subtitle:'What are the amiodarone dosing regimens for VF arrest vs stable arrhythmia?',tag:'DRUGS · ANTIARRHYTHMIC',tagClass:'tag-drugs',answerTitle:'Amiodarone IV dosing',blocks:[{heading:'VF / Pulseless VT (Cardiac Arrest)',pills:['300 mg IV push','Repeat 150 mg once if needed'],pillStyle:'danger'},{heading:'Stable VT / SVT / AF with RVR',items:['Bolus: 150 mg over 10 min in 100 mL D5W','Infusion #1: 1 mg/min × 6 hrs (360 mg)','Infusion #2: 0.5 mg/min × 18 hrs (540 mg)','Max 24 hr dose: 2.2 g']},{heading:'Rate Calculation (900 mg in 500 mL D5W = 1.8 mg/mL)',table:[['Bolus (150 mg/10 min)','≈620 mL/hr (in 100 mL D5W)','—'],['Infusion #1 (1 mg/min)','33.3 mL/hr','6 hrs'],['Infusion #2 (0.5 mg/min)','16.7 mL/hr','18 hrs']],tableHeaders:['Phase','Rate','Duration']},{heading:'Key Side Effects',pills:['Hypotension','Bradycardia','Phlebitis (use central line)','Long-term: thyroid / pulmonary toxicity'],pillStyle:'warn'}],pearl:'Amiodarone has a half-life of 40–55 days. Acute IV effects are primarily Class III (K⁺ channel blockade) but it exhibits all four Vaughan Williams classes.'},

  // ── REGIONAL ─────────────────────────────────────────────────────────────────
  {topic:'regional',title:'Spinal Anaesthesia Dosing',subtitle:'What determines spinal anaesthetic dose — and what is the role of height vs weight?',tag:'REGIONAL · SPINAL',tagClass:'tag-regional',answerTitle:'Spinal dosing determinants',blocks:[{heading:'Surgical Level Targets',table:[['Perineal surgery','S₂–S₄','5–7.5 mg'],['Knee arthroscopy','T₁₂','7.5–10 mg'],['Lower limb ortho','T₁₀','10–12.5 mg'],['Hip surgery','T₈–T₁₀','12–15 mg'],['Caesarean section','T₄','10–12 mg + opioid'],['TURP','T₁₀','8–10 mg']],tableHeaders:['Surgery','Target','Dose (0.5% heavy bupi)']},{heading:'Key Modifiers',items:['Height (most important): tall → more; short → less (0.06 mg/cm rule)','Age >65: reduce 10–20%; >80: reduce ~30%','Obesity: reduce 10–20%','Pregnancy: reduce 10–20%'],pills:['Weight does NOT reliably predict CSF volume'],pillStyle:'warn'}],pearl:'Height adjustment is far more relevant than weight. A 150 cm patient needs ~8–9 mg for lower limb surgery vs 11–12 mg for a 180 cm patient.'},
  {topic:'regional',title:'Spinal Needles & PDPH',subtitle:'Why do Whitacre pencil-point needles cause less PDPH than Quincke cutting needles?',tag:'REGIONAL · PDPH',tagClass:'tag-regional',answerTitle:'Spinal needles and PDPH prevention',blocks:[{heading:'Key Principle',items:['Needle design and technique matter as much as size','Even 32G Quincke needles did not eliminate PDPH','Dural fibres criss-cross (not parallel) — different needles create different lesions']},{heading:'Needle Comparison',table:[['Quincke (cutting)','U-shaped flap lesion (like tin can lid)','Flap may open → persistent CSF leak'],['Whitacre (pencil-point)','Coarse irregular lesion','Dural flap closes under CSF pressure']],tableHeaders:['Needle','Dural Injury','Mechanism']},{heading:'Reducing PDPH: Technique Tips',items:['Angled insertion ~30–35° (paramedian approach)','Bevel pointing downward, facing skin → CSF pressure closes flap','Reinsert stylet before removing needle (Strupp study: PDPH 16.3% → 5%)']}],pearl:'Always reinsert the stylet before withdrawing a pencil-point needle — arachnoid strands can be pulled through the dura creating a wick effect.'},
  {topic:'regional',title:'Graded Epidural',subtitle:'What is a graded epidural and what are the steps of incremental dosing?',tag:'REGIONAL · EPIDURAL',tagClass:'tag-regional',answerTitle:'Graded epidural: concept and execution',blocks:[{heading:'What & Why',items:['Controlled, incremental LA via epidural catheter to gradually achieve desired block','Titrable block height, haemodynamic stability, customisable density','Sudden sympathetic block → ↓ SVR → hypotension; gradual dosing → cardiovascular adaptation']},{heading:'Technique (Stepwise)',items:['Epidural placement: LOR to saline/air, insert catheter 3–5 cm in epidural space','Test dose: 3 mL lignocaine 1.5% + adrenaline 1:200,000','Incremental dosing: 3–5 mL aliquots, wait 3–5 min, assess after each','Monitor: BP every 2–3 min, HR, block level, Bromage scale']},{heading:'Drugs',items:['(Levo)bupivacaine 0.25–0.5% or ropivacaine 0.2–0.5%','± opioid (fentanyl 2–4 mcg/mL)','Lower concentration + higher volume → better spread, less motor block']},{heading:'Advantages (Exam Gold)',pills:['Haemodynamic stability','Adjustable height','Reduced high spinal risk','Can extend with top-ups','Safer in cardiac/elderly'],pillStyle:'normal'}],pearl:'The graded epidural\'s key exam distinction: progressive sympathectomy with cardiovascular adaptation — critical in IHD, low EF, hypovolaemia.'},
  {topic:'regional',title:'TKA Motor-Sparing Blocks',subtitle:'What motor-sparing regional techniques are used in total knee arthroplasty?',tag:'REGIONAL · TKA',tagClass:'tag-regional',answerTitle:'Motor-sparing regional techniques in TKA',blocks:[{heading:'Core Techniques',items:['Adductor Canal Block (ACB) — sensory saphenous nerve; preserves quad strength vs femoral nerve block','Genicular Nerve Block — 20–40 mL LA = equivalent to 150 mL LIA; much lower toxicity risk','iPACK Block — targets posterior knee capsule for deep behind-knee pain']},{heading:'Multi-Block Combination (ACB + Genicular + iPACK)',pills:['68% reduction in opioid use','↓ hospital stay by 1.8 days','ERAS integration'],pillStyle:'normal'}],pearl:'The shift from femoral nerve block to ACB preserves quad strength — enabling same-day physio and earlier discharge.'},
  {topic:'regional',title:'Ultrasound-Guided Spinal Marking',subtitle:'Describe the 4-step US approach to lumbar spine marking.',tag:'REGIONAL · NEURAXIAL US',tagClass:'tag-regional',answerTitle:'4-step ultrasound spinal marking',blocks:[{heading:'Equipment',pills:['Low-frequency curvilinear 2–5 MHz','Depth 6–10 cm','Abdominal/nerve preset'],pillStyle:'normal'},{heading:'Steps',table:[['Step 1','Transverse view — identify midline; spinous processes (hyperechoic + shadow); draw vertical line when LFDC visible'],['Step 2','Transverse view — slide probe cranio-caudally; count spaces (L₂–L₅); Tuffier\'s ≈L4; mark horizontal line at chosen space'],['Step 3','Paramedian oblique view — 1–2 cm lateral; confirm "saw-tooth"/"trident" sign; confirm depth to dura'],['Step 4','Intersection of vertical + horizontal lines = insertion point; draw dot; proceed with spinal']],tableHeaders:['Step','Action']}],pearl:'US is best used as a pre-procedural mapping tool. Most valuable in obesity, scoliosis, previous spine surgery, and failed attempts.'},

  // ── CRITICAL ─────────────────────────────────────────────────────────────────
  {topic:'critical',title:'Hypotension Under Anaesthesia',subtitle:'What is the MAP threshold, and how do you structure the diagnostic approach?',tag:'CRITICAL · HAEMODYNAMICS',tagClass:'tag-critical',answerTitle:'Intraoperative hypotension framework',blocks:[{heading:'Thresholds',table:[['<65 mmHg','Organ perfusion begins to fall'],['<60 mmHg','Myocardial & renal injury risk'],['<55 mmHg','Strong AKI + myocardial injury association'],['>20–30% drop','Relative hypotension — equally dangerous']],tableHeaders:['MAP','Risk']},{heading:'3 Rapid Questions (MAP = CO × SVR + CVP)',items:['Is the tank empty? → bleeding, hypovolaemia → fluids / control bleeding','Is the pump weak? → drugs, ischaemia → ephedrine, adrenaline, inotropes','Are the pipes too wide? → propofol, volatile, neuraxial → phenylephrine, metaraminol, noradrenaline']},{heading:'APICE Clinical Rule',pills:['MAP ≥65 mmHg','OR within 20% of baseline','Whichever is higher'],pillStyle:'danger'}],pearl:'Hypotension should never be "observed" — even brief episodes below 55 mmHg cause major complications. Treat early.'},
  {topic:'critical',title:'Recognising Haemorrhage',subtitle:'What are the early haemodynamic signs of significant intraoperative blood loss?',tag:'CRITICAL · HAEMORRHAGE',tagClass:'tag-critical',answerTitle:'Clinical signs of haemorrhage under anaesthesia',blocks:[{heading:'Classic Triad (M&M evidence)',pills:['Persistent tachycardia','New ↑ vasoconstrictor requirement','HR > systolic BP'],pillStyle:'danger'},{heading:'Why It\'s Subtle Under GA',items:['Volatile agents blunt tachycardia response','Neuraxial blocks prevent compensatory vasoconstriction','BP may be maintained until >30% blood loss (Class III)']},{heading:'Immediate Actions',items:['Call for help early','Establish 2nd large-bore IV access','Warmed blood products + MTP if indicated','Consider cell salvage, TXA, ROTEM/TEG']}],pearl:'HR > systolic BP is a simple, powerful bedside sign of haemorrhagic shock. Don\'t wait for hypotension to act.'},

  // ── SAFETY (NEW) ─────────────────────────────────────────────────────────────
  {topic:'safety',title:'LAST: Local Anaesthetic Systemic Toxicity',subtitle:'What are the signs of LAST, and what is the treatment protocol including intralipid?',tag:'SAFETY · TOXICITY',tagClass:'tag-safety',answerTitle:'Local anaesthetic systemic toxicity (LAST)',blocks:[{heading:'Mechanism',items:['LA enters systemic circulation → blocks Na⁺ channels in CNS + cardiac tissue','Bupivacaine most cardiotoxic (high lipid solubility, slow dissociation)','Risk factors: high dose, intravascular injection, extremes of age, low muscle mass, hepatic impairment']},{heading:'Clinical Features (CNS before cardiac, usually)',table:[['CNS Excitation (early)','Perioral tingling, metallic taste, tinnitus, agitation, seizures'],['CNS Depression (late)','LOC, respiratory arrest'],['Cardiac (severe)','Arrhythmia, conduction block, VF, asystole — may be first sign with bupivacaine']],tableHeaders:['Phase','Features']},{heading:'Prevention',items:['Aspiration before every injection','Incremental dosing with adrenaline marker (1:200,000)','LA dose within safe limits — use ideal body weight','Ultrasound guidance reduces volume required']},{heading:'LAST Treatment',items:['Stop injection — call for help — ABC + 100% O₂','Seizures: benzodiazepine (avoid propofol in cardiovascular compromise)','Cardiac arrest: standard ALS (reduce adrenaline dose if using lipid emulsion)']},{heading:'Intralipid 20% Protocol',pills:['Bolus: 1.5 mL/kg IV over 1 min','Infusion: 0.25 mL/kg/min','Repeat bolus ×2 if no response','Max: 12 mL/kg total'],pillStyle:'danger'}],pearl:'LAST can be delayed up to 30 min after injection. In cardiac arrest from LAST, prolonged resuscitation is warranted — patients have survived after 60+ min of CPR with lipid emulsion.'},
  {topic:'safety',title:'Awareness Under Anaesthesia',subtitle:'What are the risk factors, detection, and consequences of intraoperative awareness?',tag:'SAFETY · AWARENESS',tagClass:'tag-safety',answerTitle:'Intraoperative awareness',blocks:[{heading:'Definition & Incidence',items:['Explicit awareness: conscious recall of intraoperative events with or without pain','Incidence: ~1–2 per 1000 GA cases (higher in TIVA without EEG monitoring)','Isolated paralysis without anaesthesia = worst scenario']},{heading:'Risk Factors',table:[['Patient','Chronic opioid/alcohol use, obesity, previous awareness, anxiety'],['Surgical','Cardiac surgery, C-section, trauma/emergency, bronchoscopy'],['Anaesthetic','TIVA without EEG, low volatile dose, failed equipment, difficult airway']],tableHeaders:['Category','Risk Factors']},{heading:'Detection',items:['Clinical signs: tachycardia, hypertension, lacrimation, movement, sweating (all blunted by opioids + NMB)','pEEG (BIS, Entropy): BIS target 40–60 during GA','EtAA: minimum alveolar concentration (MAC) — maintain >0.7 MAC age-adjusted','TIVA: pEEG monitoring is strongly recommended']},{heading:'Management After Awareness',items:['Acknowledge what happened — do not dismiss','Debrief sensitively: validate distress, explain what happened','Refer to psychologist/psychiatrist early (PTSD risk is real)','Complete incident report + document carefully']},{heading:'Prevention',items:['Pre-op: identify high-risk patients, adjust technique','Intraop: pEEG monitoring in TIVA, check equipment/TIVA connections','Avoid paralysis without confirmed adequate depth','Have plan for circuit failure / drug failure']}],pearl:'PTSD occurs in up to 70% of awareness patients who experience pain or paralysis. Early psychological support is a clinical obligation, not a courtesy.'},
  {topic:'safety',title:'Transfusion Triggers & MTP',subtitle:'When do you transfuse red cells, and how do you activate and manage a massive transfusion protocol?',tag:'SAFETY · TRANSFUSION',tagClass:'tag-safety',answerTitle:'Transfusion triggers and massive transfusion',blocks:[{heading:'Red Cell Transfusion Thresholds',table:[['Hb <70 g/L','Transfuse (most stable patients)'],['Hb 70–100 g/L','Transfuse if symptomatic or high cardiac risk'],['Hb >100 g/L','Transfuse only if exceptional clinical circumstances'],['Active haemorrhage','Do not wait for threshold — treat coagulopathy simultaneously']],tableHeaders:['Hb Level','Action']},{heading:'Massive Transfusion Protocol (MTP)',items:['Definition: >10 units RBC in 24h, or >4 units in 1h, or >50% blood volume replacement','Goal: deliver balanced resuscitation — avoid crystalloid excess','Empirical ratio: RBC : FFP : Platelets = 1:1:1 (or close to it)','Add cryoprecipitate early if fibrinogen <1.5 g/L']},{heading:'ROTEM/TEG-Guided MTP',items:['Preferred over empirical dosing where available','Guides targeted component therapy','Reduces unnecessary transfusion and associated risks']},{heading:'Complications of Transfusion',pills:['TACO (circulatory overload)','TRALI (acute lung injury)','Hypocalcaemia (citrate chelation)','Hyperkalaemia','Hypothermia','Coagulopathy of massive transfusion'],pillStyle:'warn'},{heading:'Adjuncts',items:['Tranexamic acid: 1 g IV in <3 hours of trauma (CRASH-2); repeat 1 g over 8 hrs','Calcium: 10 mL 10% CaCl₂ per 4 units RBC (counteract citrate)','Cell salvage where appropriate']}],pearl:'The lethal triad — hypothermia, acidosis, coagulopathy — is a self-perpetuating cycle. Break it early: warm products, buffer, and give clotting factors, not just volume.'},

  // ── PHYSIOLOGY ────────────────────────────────────────────────────────────────
  {topic:'physiology',title:'Acid-Base Homeostasis',subtitle:'How do the body\'s three buffering systems respond to alkalosis and acidosis?',tag:'PHYSIOLOGY · ACID-BASE',tagClass:'tag-physiology',answerTitle:'Acid-base regulation: three systems',blocks:[{heading:'Response to Alkalosis (↑ pH)',items:['Lungs: ↓ rate and depth → ↑ blood CO₂','Kidney (DCT): ↓ H⁺ secretion; ↓ HCO₃⁻ reabsorption','Buffers: release H⁺']},{heading:'Response to Acidosis (↓ pH)',items:['Lungs: ↑ rate and depth → ↓ blood CO₂','Kidney (DCT): ↑ H⁺ secretion; ↑ HCO₃⁻ reabsorption','Buffers: bind H⁺']},{heading:'Speed of Compensation',table:[['Buffers','Seconds–minutes','Immediate, incomplete'],['Respiratory','Minutes–hours','Rapid, powerful, incomplete'],['Renal','12–72 hours','Slow but complete']],tableHeaders:['System','Speed','Characteristic']}],pearl:'Compensation never fully corrects pH — it returns toward normal, not to normal. Full correction only occurs when the primary disorder resolves.'}
];

let currentCards=[...cards],currentIndex=0,isFlipped=false;

function filterTopic(topic,el){
  document.querySelectorAll('.topic-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  currentCards=topic==='all'?[...cards]:cards.filter(c=>c.topic===topic);
  currentIndex=0;isFlipped=false;renderCard();
}
function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped',isFlipped);
}
function navigate(dir){
  const n=currentIndex+dir;
  if(n<0||n>=currentCards.length)return;
  currentIndex=n;isFlipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
  const w=document.getElementById('card-wrapper');
  w.style.animation='none';w.offsetHeight;w.style.animation='';
}
function renderCard(){
  const card=currentCards[currentIndex],total=currentCards.length;
  document.getElementById('card-counter').textContent=`CARD ${currentIndex+1} OF ${total}`;
  document.getElementById('prog-text').textContent=`${currentIndex+1} / ${total}`;
  document.getElementById('prog-bar').style.width=`${((currentIndex+1)/total)*100}%`;
  document.getElementById('prev-btn').disabled=currentIndex===0;
  document.getElementById('next-btn').disabled=currentIndex===total-1;

  document.getElementById('front-face').innerHTML=`
    <div class="card-tag ${card.tagClass}"><span class="dot"></span>${card.tag}</div>
    <div class="card-question"><h2>${card.title}</h2><p class="subtitle">${card.subtitle}</p></div>
    <div class="card-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Tap to reveal answer</div>`;

  let bHTML='';
  for(const b of card.blocks){
    let c='';
    if(b.items)c+=`<ul>${b.items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
    if(b.pills){const cls=b.pillStyle==='warn'?'warn':b.pillStyle==='danger'?'danger':b.pillStyle==='purple'?'purple':'';c+=`<div class="pill-row">${b.pills.map(p=>`<span class="pill ${cls}">${p}</span>`).join('')}</div>`;}
    if(b.table)c+=`<table class="ans-table"><thead><tr>${b.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${b.table.map(row=>`<tr>${row.map(cell=>`<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    bHTML+=`<div class="ans-block"><h4>${b.heading}</h4>${c}</div>`;
  }
  document.getElementById('back-face').innerHTML=`
    <div class="card-tag ${card.tagClass}"><span class="dot"></span>${card.tag}</div>
    <div class="card-answer"><div class="answer-title">${card.answerTitle}</div>${bHTML}${card.pearl?`<div class="exam-pearl">${card.pearl}</div>`:''}</div>`;
}
renderCard();
</script>
</body>
</html>
